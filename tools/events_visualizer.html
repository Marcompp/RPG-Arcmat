<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events List</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a; --bg2: #16213e; --bg3: #1a1a2e; --bg4: #0d1520;
    --border: #2a2a4a; --text: #e2e8f0; --text-muted: #94a3b8;
    --bar-h: 48px; --filter-h: 44px;
  }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; font-size:13px; }

  /* ── TOP BAR ── */
  #topbar {
    position:fixed; top:0; left:0; right:0; z-index:20;
    height:var(--bar-h); display:flex; align-items:center; gap:10px; padding:0 14px;
    background:var(--bg3); border-bottom:1px solid var(--border);
  }
  #topbar h1 { font-size:13px; font-weight:600; color:var(--text-muted); flex-shrink:0; }
  #file-label {
    display:inline-flex; align-items:center; gap:6px; cursor:pointer; flex-shrink:0;
    padding:5px 10px; border-radius:5px; background:#1e3a5f; border:1px solid #2a4a7f;
    color:var(--text); white-space:nowrap; transition:background .15s;
  }
  #file-label:hover { background:#254e80; }
  #file-picker { display:none; }
  .file-badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; background:#0f2a1a; border:1px solid #1a4a2a; color:#4ade80; flex-shrink:0; }
  .file-badge.missing { background:#1a1a2e; border-color:var(--border); color:var(--text-muted); }
  #search-event { padding:5px 10px; border-radius:5px; background:var(--bg2); border:1px solid var(--border); color:var(--text); outline:none; width:180px; margin-left:auto; }
  #search-event:focus { border-color:#4a6a9f; }
  #search-event::placeholder { color:var(--text-muted); }
  #row-count { font-size:11px; color:var(--text-muted); flex-shrink:0; white-space:nowrap; }

  /* ── FILTER BAR ── */
  #filterbar {
    position:fixed; top:var(--bar-h); left:0; right:0; z-index:19;
    height:var(--filter-h); display:flex; align-items:center; gap:8px; padding:0 14px;
    background:var(--bg4); border-bottom:1px solid var(--border);
  }
  .filter-label { font-size:11px; color:var(--text-muted); flex-shrink:0; }
  select.filter-sel {
    padding:4px 8px; border-radius:5px; background:var(--bg2); border:1px solid var(--border);
    color:var(--text); cursor:pointer; font-size:12px; max-width:160px;
  }
  select.filter-sel:focus { outline:none; border-color:#4a6a9f; }
  .filter-sep { width:1px; height:20px; background:var(--border); flex-shrink:0; }
  .type-btns { display:flex; gap:3px; flex-wrap:nowrap; }
  .type-btn {
    padding:3px 9px; border-radius:4px; border:1px solid var(--border); cursor:pointer;
    font-size:11px; font-weight:600; background:var(--bg2); color:var(--text-muted);
    transition:background .1s, color .1s; white-space:nowrap;
  }
  .type-btn.active { color:#fff; border-color:transparent; }
  .type-btn[data-type="all"].active     { background:#374151; }
  .type-btn[data-type="action"].active  { background:#1d4ed8; }
  .type-btn[data-type="random"].active  { background:#92400e; }
  .type-btn[data-type="region"].active  { background:#166534; }
  .type-btn[data-type="town"].active    { background:#9a3412; }
  .type-btn[data-type="exit"].active    { background:#581c87; }
  .type-btn[data-type="orphan"].active  { background:#374151; }

  /* ── MAIN LAYOUT ── */
  #main {
    display:flex; position:fixed;
    top:calc(var(--bar-h) + var(--filter-h)); bottom:0; left:0; right:0;
  }
  #table-wrap { flex:1; overflow-y:auto; overflow-x:auto; }
  #sidebar-placeholder { color:var(--text-muted); font-size:12px; margin-top:20px; text-align:center; }

  /* ── TABLE ── */
  table { width:100%; border-collapse:collapse; font-size:12px; }
  thead th {
    position:sticky; top:0; z-index:5; background:var(--bg3);
    padding:8px 10px; text-align:left; font-size:10px; font-weight:700;
    letter-spacing:.06em; text-transform:uppercase; color:var(--text-muted);
    border-bottom:1px solid var(--border); white-space:nowrap; user-select:none; cursor:pointer;
  }
  thead th:hover { color:var(--text); }
  thead th .sort-arrow { font-size:9px; margin-left:3px; }
  tbody tr { border-bottom:1px solid #1a1a2a; cursor:pointer; transition:background .08s; }
  tbody tr:hover { background:#16213e; }
  tbody tr.selected { background:#1a2a4a; border-left:3px solid #3b82f6; }
  tbody tr:not(.selected) { border-left:3px solid transparent; }
  td { padding:6px 10px; vertical-align:middle; }
  .col-event { font-family:monospace; font-size:11px; font-weight:600; max-width:180px; }
  .col-type  { width:90px; }
  .col-source { max-width:130px; color:var(--text); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .col-region { max-width:120px; color:var(--text-muted); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .col-chance { width:52px; text-align:center; font-size:11px; color:var(--text-muted); }
  .col-tags  { width:100px; }
  .col-rep   { width:38px; text-align:center; font-size:11px; }
  .col-steps { width:44px; text-align:center; font-size:11px; color:var(--text-muted); }
  .type-pill {
    display:inline-block; padding:2px 8px; border-radius:10px;
    font-size:10px; font-weight:700; white-space:nowrap;
  }
  .tp-action  { background:#1e3a8a; color:#93c5fd; }
  .tp-random  { background:#78350f; color:#fde68a; }
  .tp-region  { background:#14532d; color:#86efac; }
  .tp-town    { background:#7c2d12; color:#fdba74; }
  .tp-exit    { background:#3b0764; color:#e9d5ff; }
  .tp-orphan  { background:#1a1a2e; color:#6b7280; }
  .tag-dot {
    display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:2px;
  }
  .rep-yes { color:#4ade80; }
  .rep-no  { color:#f87171; }
  #empty-msg {
    padding:60px 0; text-align:center; color:var(--text-muted);
  }
  #empty-msg .big { font-size:28px; display:block; margin-bottom:8px; }

  /* ── SIDEBAR ── */
  .sb-title { font-size:14px; font-weight:700; margin-bottom:4px; word-break:break-all; }
  .sb-meta  { font-size:11px; color:var(--text-muted); margin-bottom:8px; }
  .sb-section { margin-top:12px; }
  .sb-label { font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--text-muted); margin-bottom:5px; }
  .sb-pill { display:inline-block; padding:2px 7px; border-radius:10px; font-size:11px; font-weight:600; margin:2px 2px 2px 0; }
  .sp-combat  { background:#3b0a0a; color:#fca5a5; }
  .sp-random  { background:#3b2a00; color:#fde68a; }
  .sp-if      { background:#2d1557; color:#c4b5fd; }
  .sp-choice  { background:#0a1a4a; color:#93c5fd; }
  .sp-event   { background:#042f3a; color:#67e8f9; }
  .sp-shop    { background:#3a1a00; color:#fdba74; }
  .sp-text    { background:#0a1a0a; color:#86efac; }
  .sp-effect  { background:#1a1a3a; color:#a5b4fc; }
  .sp-other   { background:#1a1a1a; color:var(--text-muted); }
  .use-row { padding:4px 0; border-bottom:1px solid var(--border); font-size:11px; }
  .use-row:last-child { border-bottom:none; }
  .use-source { color:var(--text); }
  .use-meta   { color:#4a5a7a; font-size:10px; }
  details summary { cursor:pointer; color:var(--text-muted); font-size:11px; padding:3px 0; list-style:none; }
  details summary::before { content:'▶ '; font-size:9px; }
  details[open] summary::before { content:'▼ '; }
  .step-row { font-size:10px; padding:1px 0; display:flex; gap:4px; align-items:baseline; }
  .step-t { font-family:monospace; font-weight:700; flex-shrink:0; }
  .step-d { color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:160px; }
  .step-branch { color:#3a5a6a; font-size:10px; padding:1px 0; font-style:italic; }
  .step-text-block { display:flex; flex-direction:column; gap:3px; padding:2px 0; }
  .step-text-content {
    font-size:11px; color:#cbd5e1; white-space:pre-wrap; word-break:break-word;
    line-height:1.45; padding:4px 8px; background:#0d1520; border-radius:3px;
    border-left:2px solid #1e4a2e;
  }
  hr { border:none; border-top:1px solid var(--border); margin:8px 0; }

  /* ── SIDEBAR EDIT MODE ── */
  #sidebar { width:280px; flex-shrink:0; overflow-y:auto; background:var(--bg3); border-left:1px solid var(--border); padding:14px; transition:width .2s; }
  #sidebar.editing { width:440px; }

  .editor-header {
    position:sticky; top:-14px; z-index:2; background:var(--bg3);
    border-bottom:1px solid var(--border); margin:-14px -14px 12px -14px;
    padding:10px 14px; display:flex; justify-content:space-between; align-items:center; gap:8px;
  }
  .editor-title { font-size:12px; font-weight:700; word-break:break-all; flex:1; }
  .editor-actions { display:flex; gap:5px; flex-shrink:0; }

  .text-editor {
    width:100%; resize:none; overflow:hidden; min-height:60px;
    background:#0a1120; border:1px solid var(--border); border-radius:4px;
    color:#e2e8f0; font-family:Georgia,'Palatino Linotype',serif;
    font-size:13px; line-height:1.65; padding:8px 10px;
    white-space:pre-wrap; word-break:break-word; margin-top:4px;
    transition:border-color .15s;
  }
  .text-editor:focus { outline:none; border-color:#4a6a9f; box-shadow:0 0 0 2px #1a2a4a; }
  .edit-field {
    background:#0a1120; border:1px solid var(--border); border-radius:4px;
    color:var(--text); font-size:12px; padding:4px 8px; width:100%;
  }
  .edit-field:focus { outline:none; border-color:#4a6a9f; }
  .edit-field-sm { width:64px; }
  .edit-field-row { display:flex; align-items:center; gap:8px; margin:4px 0; }
  .edit-field-label { font-size:10px; color:var(--text-muted); width:56px; flex-shrink:0; text-transform:uppercase; letter-spacing:.05em; }

  .step-editor-block { border-left:2px solid #475569; padding:5px 0 5px 10px; margin:5px 0; }
  .step-type-label { font-family:monospace; font-size:10px; font-weight:700; margin-bottom:3px; }
  .edit-branch-label { color:#3a5a6a; font-size:10px; margin:5px 0 2px 0; font-style:italic; }
  .edit-cond { font-family:monospace; font-size:10px; color:#a5b4fc; background:var(--bg2); padding:4px 6px; border-radius:3px; margin:3px 0; word-break:break-all; }
  .edit-readonly-detail { font-size:11px; color:var(--text-muted); }
  .edit-check-label { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); cursor:pointer; margin:6px 0; }
  .edit-check-small { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--text-muted); margin-top:3px; cursor:pointer; }

  .dirty-dot { color:#f59e0b; font-size:10px; margin-right:3px; }

  .btn-edit { padding:3px 9px; border-radius:4px; border:1px solid #2a4a7f; background:#1e3a5f; color:var(--text); font-size:11px; cursor:pointer; }
  .btn-edit:hover { background:#254e80; }
  .btn-save { padding:4px 12px; border-radius:4px; border:none; background:#166534; color:#86efac; font-size:11px; font-weight:600; cursor:pointer; }
  .btn-save:hover { background:#15803d; }
  .btn-cancel { padding:4px 10px; border-radius:4px; border:1px solid var(--border); background:var(--bg2); color:var(--text-muted); font-size:11px; cursor:pointer; }
  .btn-cancel:hover { color:var(--text); }
  .btn-download { padding:5px 12px; border-radius:5px; border:none; background:#92400e; color:#fde68a; font-size:12px; font-weight:600; cursor:pointer; flex-shrink:0; display:none; }
  .btn-download:hover { background:#78350f; }

  .add-step-row { display:flex; gap:5px; align-items:center; padding:5px 0; margin-top:4px; }
  .add-step-sel { background:#0a1120; border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:11px; padding:3px 6px; }
  .btn-step-add { padding:3px 9px; border-radius:4px; border:1px solid #1a4a2a; background:#0f2a1a; color:#4ade80; font-size:11px; cursor:pointer; }
  .btn-step-add:hover { background:#1a4a2a; }
  .btn-step-del { padding:1px 5px; border-radius:3px; border:none; background:transparent; color:#4a5a7a; font-size:12px; cursor:pointer; line-height:1; }
  .btn-step-del:hover { background:#3b0a0a; color:#fca5a5; }
</style>
</head>
<body>

<div id="topbar">
  <h1>Events</h1>
  <label id="file-label" for="file-picker">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Load files
  </label>
  <input type="file" id="file-picker" accept=".json" multiple>
  <span class="file-badge missing" id="badge-events">events</span>
  <span class="file-badge missing" id="badge-nodes">area_nodes</span>
  <span class="file-badge missing" id="badge-regions">regions</span>
  <span class="file-badge missing" id="badge-towns">towns</span>
  <span id="row-count"></span>
  <input type="text" id="search-event" placeholder="Search event name…">
  <button class="btn-download" id="btn-download" onclick="downloadEvents()"></button>
</div>

<div id="filterbar">
  <span class="filter-label">Region</span>
  <select class="filter-sel" id="filter-region">
    <option value="">All regions</option>
  </select>
  <span class="filter-label">Node</span>
  <select class="filter-sel" id="filter-node">
    <option value="">All nodes</option>
  </select>
  <div class="filter-sep"></div>
  <div class="type-btns" id="type-btns">
    <button class="type-btn active" data-type="all">All</button>
    <button class="type-btn" data-type="action">Action</button>
    <button class="type-btn" data-type="random">Random</button>
    <button class="type-btn" data-type="region">Region</button>
    <button class="type-btn" data-type="town">Town</button>
    <button class="type-btn" data-type="exit">Exit</button>
    <button class="type-btn" data-type="orphan">Unreferenced</button>
  </div>
</div>

<div id="main">
  <div id="table-wrap">
    <div id="empty-msg">
      <span class="big">📋</span>
      Load <strong>events.json</strong> to begin.<br>
      <span style="font-size:12px;color:#4a5a7a">Also load area_nodes.json · regions.json · towns.json for source info.</span>
    </div>
    <table id="evt-table" style="display:none">
      <thead>
        <tr>
          <th data-col="eventName">Event <span class="sort-arrow"></span></th>
          <th data-col="type">Type <span class="sort-arrow"></span></th>
          <th data-col="sourceId">Source Node / Town <span class="sort-arrow"></span></th>
          <th data-col="region">Region <span class="sort-arrow"></span></th>
          <th data-col="chance">Chance <span class="sort-arrow"></span></th>
          <th data-col="tags">Tags</th>
          <th data-col="stepCount">Steps <span class="sort-arrow"></span></th>
          <th data-col="repeatable">Rep. <span class="sort-arrow"></span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <aside id="sidebar">
    <div id="sidebar-placeholder">Click a row to see details.</div>
  </aside>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let eventsDb = null, areaNodesDb = null, regionsDb = null, townsDb = null;
let typesMap = {}, stepCounts = {}, chainMap = {};
let allOccs = [], filteredOccs = [];
let selectedIdx = -1;
let sortCol = 'eventName', sortDir = 1;
let filterRegion = '', filterNode = '', filterType = 'all', filterSearch = '';
let editBuffer = null, editingEvent = null, dirtyEvents = new Set();

const TAG_COLORS = {
  combat: '#dc2626', random: '#ca8a04', 'if': '#7c3aed',
  choice: '#2563eb', event: '#0891b2', shop: '#d97706',
  text: '#16a34a', effect: '#6366f1',
};
const EVENT_COLORS = { combat:'#dc2626', random:'#ca8a04', 'if':'#7c3aed', choice:'#2563eb' };

const STEP_DEFAULTS = {
  text:        { type:'text', text:'', clear:false },
  choice:      { type:'choice', header:'', choices:[{choice:'Option A',key:'a'},{choice:'Option B',key:'b'}], branches:{a:[],b:[]} },
  combat:      { type:'combat', enemy:'', on_victory:[] },
  'if':        { type:'if', condition:{}, then:[], else:[] },
  random:      { type:'random', outcomes:[{weight:5,steps:[]},{weight:5,steps:[]}] },
  event:       { type:'event', event:'' },
  sfx:         { type:'sfx', sound:'' },
  give_gold:   { type:'give_gold', amount:0 },
  give_item:   { type:'give_item', item:'' },
  modify_stat: { type:'modify_stat', stat:'', amount:1 },
  show_node:   { type:'show_node' },
  exit_node:   { type:'exit_node', leads_to:'' },
  mark_used:   { type:'mark_used' },
};

// ─── File loading ─────────────────────────────────────────────────────────────
document.getElementById('file-picker').addEventListener('change', e => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  let pending = files.length;
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => {
      try { ingestFile(JSON.parse(ev.target.result), f.name); }
      catch(err) { alert(`Failed to parse ${f.name}: ${err.message}`); }
      if (--pending === 0) onLoaded();
    };
    reader.readAsText(f);
  });
  e.target.value = '';
});

function detectType(data) {
  const v = Object.values(data);
  if (!v.length) return null;
  const s = v[0];
  if (s && s.steps && Array.isArray(s.steps)) return 'events';
  if (Array.isArray(s) && s.length && (s[0].exits !== undefined || s[0].entrances !== undefined)) return 'area_nodes';
  if (s && s.Events && Array.isArray(s.Events)) return 'regions';
  if (s && (s.ExitEvent !== undefined || s.NPCs !== undefined)) return 'towns';
  return null;
}

function ingestFile(data, filename) {
  const t = detectType(data);
  if (t === 'events')     { eventsDb = data;     document.getElementById('badge-events').classList.remove('missing'); }
  if (t === 'area_nodes') { areaNodesDb = data;   document.getElementById('badge-nodes').classList.remove('missing'); }
  if (t === 'regions')    { regionsDb = data;     document.getElementById('badge-regions').classList.remove('missing'); }
  if (t === 'towns')      { townsDb = data;       document.getElementById('badge-towns').classList.remove('missing'); }
  if (!t) console.warn('Unrecognized file:', filename);
}

function onLoaded() {
  if (!eventsDb) return;
  processEvents();
  buildOccurrences();
  populateRegionDropdown();
  populateNodeDropdown();
  applyFilters();
  document.getElementById('empty-msg').style.display = 'none';
  document.getElementById('evt-table').style.display = '';
}

// ─── Process events.json ──────────────────────────────────────────────────────
function processEvents() {
  typesMap = {}; stepCounts = {}; chainMap = {};
  for (const [name, ev] of Object.entries(eventsDb)) {
    typesMap[name]   = classifySteps(ev.steps);
    stepCounts[name] = countSteps(ev.steps);
    chainMap[name]   = collectChains(ev.steps);
  }
}

function classifySteps(steps) {
  const types = new Set();
  const EFFECT = new Set(['give_gold','give_item','give_region_item','modify_stat','effect','heal','restore_mp']);
  const SKIP   = new Set(['mark_used','show_node','exit_node','set_var','sfx','no_wait','clear']);
  if (!Array.isArray(steps)) return types;
  for (const s of steps) {
    if (!s?.type) continue;
    const t = s.type;
    if (EFFECT.has(t))      types.add('effect');
    else if (!SKIP.has(t))  types.add(t);
    if (s.branches) for (const sub of Object.values(s.branches)) for (const ty of classifySteps(sub)) types.add(ty);
    for (const k of ['then','else','on_victory']) if (s[k]) for (const ty of classifySteps(s[k])) types.add(ty);
    if (s.outcomes) for (const o of s.outcomes) for (const ty of classifySteps(o.steps||[])) types.add(ty);
  }
  return types;
}

function countSteps(steps) {
  if (!Array.isArray(steps)) return 0;
  let n = 0;
  for (const s of steps) {
    if (!s) continue; n++;
    if (s.branches) for (const sub of Object.values(s.branches)) n += countSteps(sub);
    for (const k of ['then','else','on_victory']) if (s[k]) n += countSteps(s[k]);
    if (s.outcomes) for (const o of s.outcomes) n += countSteps(o.steps||[]);
  }
  return n;
}

function collectChains(steps) {
  const refs = new Set();
  if (!Array.isArray(steps)) return refs;
  for (const s of steps) {
    if (!s) continue;
    if (s.type === 'event' && s.event) refs.add(s.event);
    if (s.branches) for (const sub of Object.values(s.branches)) for (const r of collectChains(sub)) refs.add(r);
    for (const k of ['then','else','on_victory']) if (s[k]) for (const r of collectChains(s[k])) refs.add(r);
    if (s.outcomes) for (const o of s.outcomes) for (const r of collectChains(o.steps||[])) refs.add(r);
  }
  return refs;
}

// ─── Build occurrences list ───────────────────────────────────────────────────
function buildOccurrences() {
  allOccs = [];
  const referenced = new Set();

  if (areaNodesDb) {
    for (const [region, nodes] of Object.entries(areaNodesDb)) {
      if (!Array.isArray(nodes)) continue;
      for (const node of nodes) {
        const src = node.name || '?';
        // Random events (chance-based)
        for (const r of (node.events || [])) {
          if (!r.event) continue;
          push({ eventName: r.event, type: 'random', sourceId: src, region, chance: r.chance ?? null, condition: r.condition ?? null });
          referenced.add(r.event);
        }
        // Action event (player-triggered)
        if (node.action?.event) {
          push({ eventName: node.action.event, type: 'action', sourceId: src, region, chance: null, condition: null, actionName: node.action.name });
          referenced.add(node.action.event);
        }
        // Exit events
        for (const ex of (node.exits || [])) {
          for (const r of (ex.events || [])) {
            if (!r.event) continue;
            push({ eventName: r.event, type: 'exit', sourceId: src, region, chance: r.chance ?? null, exitTo: ex.leads_to });
            referenced.add(r.event);
          }
        }
      }
    }
  }

  if (regionsDb) {
    for (const [rname, rdata] of Object.entries(regionsDb)) {
      for (const evName of (rdata?.Events || rdata?.events || [])) {
        if (typeof evName !== 'string') continue;
        push({ eventName: evName, type: 'region', sourceId: rname, region: rname, chance: null });
        referenced.add(evName);
      }
    }
  }

  if (townsDb) {
    for (const [tname, tdata] of Object.entries(townsDb)) {
      if (!tdata) continue;
      if (tdata.ExitEvent) {
        push({ eventName: tdata.ExitEvent, type: 'town', sourceId: tname, region: null, chance: null });
        referenced.add(tdata.ExitEvent);
      }
      if (tdata.Locations) {
        for (const [locName, loc] of Object.entries(tdata.Locations)) {
          if (loc?.Kind === 'Event' && loc.Event) {
            push({ eventName: loc.Event, type: 'town', sourceId: `${tname} → ${locName}`, region: null, chance: null });
            referenced.add(loc.Event);
          }
        }
      }
      if (tdata.Shops) {
        for (const [locName, loc] of Object.entries(tdata.Shops)) {
          if (loc?.Kind === 'Event' && loc.Event) {
            push({ eventName: loc.Event, type: 'town', sourceId: `${tname} → ${locName}`, region: null, chance: null });
            referenced.add(loc.Event);
          }
        }
      }
    }
  }

  // Unreferenced (in events.json but never triggered externally)
  for (const name of Object.keys(eventsDb)) {
    if (!referenced.has(name)) {
      push({ eventName: name, type: 'orphan', sourceId: null, region: null, chance: null });
    }
  }

  function push(occ) {
    if (!eventsDb[occ.eventName]) return; // skip broken refs
    const ev = eventsDb[occ.eventName];
    occ.repeatable = ev.repeatable !== false;
    occ.stepCount  = stepCounts[occ.eventName] || 0;
    occ.tags       = typesMap[occ.eventName] || new Set();
    allOccs.push(occ);
  }
}

// ─── Dropdowns ────────────────────────────────────────────────────────────────
function populateRegionDropdown() {
  const regions = [...new Set(allOccs.filter(o => o.region).map(o => o.region))].sort();
  const sel = document.getElementById('filter-region');
  sel.innerHTML = '<option value="">All regions</option>' +
    regions.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join('');
}

function populateNodeDropdown() {
  const baseOccs = allOccs.filter(o => o.sourceId && o.type !== 'region' && o.type !== 'town' && o.type !== 'orphan');
  const nodes = [...new Set(
    (filterRegion ? baseOccs.filter(o => o.region === filterRegion) : baseOccs).map(o => o.sourceId)
  )].sort();
  const sel = document.getElementById('filter-node');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All nodes</option>' +
    nodes.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
  sel.value = nodes.includes(cur) ? cur : '';
  filterNode = sel.value;
}

// ─── Filtering & sorting ──────────────────────────────────────────────────────
function applyFilters() {
  const q = filterSearch.toLowerCase();
  filteredOccs = allOccs.filter(o => {
    if (filterType !== 'all' && o.type !== filterType) return false;
    if (filterRegion && o.region !== filterRegion) return false;
    if (filterNode && o.sourceId !== filterNode) return false;
    if (q && !o.eventName.toLowerCase().includes(q)) return false;
    return true;
  });
  sortOccs();
  renderTable();
}

function sortOccs() {
  filteredOccs.sort((a, b) => {
    let av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
    if (typeof av === 'boolean') av = av ? 1 : 0;
    if (typeof bv === 'boolean') bv = bv ? 1 : 0;
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av === null || av === undefined || av === '') return 1;
    if (bv === null || bv === undefined || bv === '') return -1;
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

// ─── Render table ─────────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tbody');
  document.getElementById('row-count').textContent = `${filteredOccs.length} row${filteredOccs.length !== 1 ? 's' : ''}`;
  updateSortArrows();

  if (!filteredOccs.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:#4a5a7a">No events match the current filters.</td></tr>';
    return;
  }

  tbody.innerHTML = filteredOccs.map((occ, i) => {
    const color = getEventColor(occ.tags);
    const chanceStr = occ.chance !== null && occ.chance !== undefined ? `${Math.round(occ.chance * 100)}%` : '—';
    const tagHtml = buildTagDots(occ.tags);
    const repHtml = occ.repeatable
      ? '<span class="rep-yes">✓</span>'
      : '<span class="rep-no">✗</span>';
    const sel = selectedIdx === i ? ' selected' : '';
    const dirty = dirtyEvents.has(occ.eventName) ? '<span class="dirty-dot" title="Unsaved changes">●</span>' : '';
    return `<tr data-idx="${i}"${sel}>
      <td class="col-event">${dirty}<span style="color:${color}">${esc(occ.eventName)}</span></td>
      <td class="col-type"><span class="type-pill tp-${esc(occ.type)}">${esc(occ.type)}</span></td>
      <td class="col-source">${occ.sourceId ? esc(occ.sourceId) : '<span style="color:#3a4a5a">—</span>'}</td>
      <td class="col-region">${occ.region ? esc(occ.region) : '<span style="color:#3a4a5a">—</span>'}</td>
      <td class="col-chance">${chanceStr}</td>
      <td class="col-tags">${tagHtml}</td>
      <td class="col-steps">${occ.stepCount}</td>
      <td class="col-rep">${repHtml}</td>
    </tr>`;
  }).join('');

  // row click handler
  tbody.querySelectorAll('tr[data-idx]').forEach(tr => {
    tr.addEventListener('click', () => {
      const i = parseInt(tr.dataset.idx);
      if (selectedIdx === i) { deselect(); return; }
      selectedIdx = i;
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
      tr.classList.add('selected');
      showSidebar(filteredOccs[i]);
    });
  });
}

function getEventColor(tags) {
  if (tags.has('combat')) return '#dc2626';
  if (tags.has('random')) return '#ca8a04';
  if (tags.has('if'))     return '#7c3aed';
  if (tags.has('choice')) return '#2563eb';
  return '#94a3b8';
}

function buildTagDots(tags) {
  const ORDER = ['combat','random','if','choice','event','shop','effect'];
  return ORDER.filter(t => tags.has(t))
    .map(t => `<span class="tag-dot" style="background:${TAG_COLORS[t]||'#475569'}" title="${t}"></span>`)
    .join('');
}

function updateSortArrows() {
  document.querySelectorAll('thead th').forEach(th => {
    const arrow = th.querySelector('.sort-arrow');
    if (!arrow) return;
    arrow.textContent = th.dataset.col === sortCol ? (sortDir === 1 ? '▲' : '▼') : '';
  });
}

function deselect() {
  if (editingEvent) {
    editBuffer = null; editingEvent = null;
    document.getElementById('sidebar').classList.remove('editing');
  }
  selectedIdx = -1;
  document.querySelectorAll('#tbody tr').forEach(r => r.classList.remove('selected'));
  document.getElementById('sidebar').innerHTML = '<div id="sidebar-placeholder">Click a row to see details.</div>';
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function showSidebar(occ) {
  const ev = eventsDb[occ.eventName];
  if (!ev) return;
  const color = getEventColor(occ.tags);
  const steps = occ.stepCount;

  let html = `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px">
    <div class="sb-title" style="color:${color}">${esc(occ.eventName)}</div>
    <button class="btn-edit" onclick="openEditor('${esc(occ.eventName).replace(/'/g,"\\'")}')">Edit</button>
  </div>`;
  html += `<div class="sb-meta">${occ.repeatable ? 'repeatable' : 'one-shot'} · ${steps} step${steps !== 1 ? 's' : ''}${dirtyEvents.has(occ.eventName) ? ' · <span style="color:#f59e0b">unsaved changes</span>' : ''}</div>`;
  html += '<hr>';

  // Step type pills
  const ORDERED = ['combat','random','if','choice','event','shop','text','effect'];
  const pills = ORDERED.filter(t => occ.tags.has(t)).map(t => `<span class="sb-pill sp-${t}">${t}</span>`).join('');
  const other = [...occ.tags].filter(t => !ORDERED.includes(t)).map(t => `<span class="sb-pill sp-other">${esc(t)}</span>`).join('');
  if (pills || other) html += `<div class="sb-section"><div class="sb-label">Step Types</div>${pills}${other}</div>`;

  // All usages of this event
  const usages = allOccs.filter(o => o.eventName === occ.eventName && o.type !== 'orphan');
  html += `<div class="sb-section"><div class="sb-label">Triggered From (${usages.length})</div>`;
  if (!usages.length) {
    html += '<div style="color:#4a5a7a;font-size:11px">Only called by other events or unreferenced.</div>';
  } else {
    html += usages.map(u => {
      const chanceNote = u.chance !== null ? ` · ${Math.round(u.chance * 100)}%` : '';
      const typeNote   = u.type;
      const regionNote = u.region ? ` [${esc(u.region)}]` : '';
      const sourceNote = u.sourceId ? esc(u.sourceId) : '';
      const exitNote   = u.exitTo   ? ` → ${esc(u.exitTo)}` : '';
      return `<div class="use-row">
        <div class="use-source">${sourceNote || '<span style="color:#4a5a7a">—</span>'}${regionNote}</div>
        <div class="use-meta">${typeNote}${chanceNote}${exitNote}</div>
      </div>`;
    }).join('');
  }
  html += '</div>';

  // Chains to other events
  const chains = [...(chainMap[occ.eventName] || [])];
  if (chains.length) {
    html += `<div class="sb-section"><div class="sb-label">Chains To (${chains.length})</div>`;
    html += chains.map(target => {
      const exists = !!eventsDb[target];
      return `<div style="font-family:monospace;font-size:11px;padding:2px 0;color:${exists ? '#7dd3fc' : '#4a5a7a'}">${esc(target)}${exists ? '' : ' <span style="font-size:10px">(not found)</span>'}</div>`;
    }).join('');
    html += '</div>';
  }

  // Step outline
  html += `<div class="sb-section"><details><summary>Step outline (${steps})</summary>${renderStepOutline(ev.steps, 0)}</details></div>`;

  document.getElementById('sidebar').innerHTML = html;
}

function renderStepOutline(steps, depth) {
  if (!Array.isArray(steps) || !steps.length) return '';
  let html = '';
  const pad = depth * 12;
  const STEP_COLORS = { combat:'#dc2626', random:'#ca8a04', 'if':'#7c3aed', choice:'#2563eb', event:'#0891b2', shop:'#d97706', text:'#4ade80', effect:'#a5b4fc' };
  for (const s of steps) {
    if (!s) continue;
    const t = s.type || '?';
    const c = STEP_COLORS[t] || '#64748b';
    const d = stepDetail(s);
    if (t === 'text' && d) {
      html += `<div class="step-text-block" style="padding-left:${pad}px">
        <span class="step-t" style="color:${c}">text</span>
        <div class="step-text-content">${esc(d)}</div>
      </div>`;
    } else {
      html += `<div class="step-row" style="padding-left:${pad}px">
        <span class="step-t" style="color:${c}">${esc(t)}</span>
        ${d ? `<span class="step-d">${esc(d)}</span>` : ''}
      </div>`;
    }
    if (s.branches) for (const [k, sub] of Object.entries(s.branches)) {
      html += `<div class="step-branch" style="padding-left:${pad+8}px">↳ ${esc(k)}</div>`;
      html += renderStepOutline(sub, depth+1);
    }
    for (const k of ['then','else','on_victory']) if (s[k]?.length) {
      html += `<div class="step-branch" style="padding-left:${pad+8}px">↳ ${k}</div>`;
      html += renderStepOutline(s[k], depth+1);
    }
    if (s.outcomes) s.outcomes.forEach((o, i) => {
      html += `<div class="step-branch" style="padding-left:${pad+8}px">↳ outcome ${i+1}${o.weight ? ` (w:${o.weight})` : ''}</div>`;
      html += renderStepOutline(o.steps||[], depth+1);
    });
  }
  return html;
}

function stepDetail(s) {
  if (!s) return '';
  switch (s.type) {
    case 'text':        return (s.text||'').replace(/\[.*?\]/g,'');
    case 'combat':      return s.enemy||'';
    case 'event':       return s.event||'';
    case 'choice':      return s.header||'';
    case 'if':          return s.condition ? JSON.stringify(s.condition).slice(0,40) : '';
    case 'give_gold':   return s.amount !== undefined ? `${s.amount}g` : '';
    case 'give_item':   return s.item||'';
    case 'modify_stat': return s.stat ? `${s.stat} ${s.amount>0?'+':''}${s.amount}` : '';
    case 'sfx':         return s.sound||'';
    case 'exit_node':   return s.leads_to||'';
    default:            return '';
  }
}

// ─── Controls ─────────────────────────────────────────────────────────────────
document.getElementById('search-event').addEventListener('input', e => {
  filterSearch = e.target.value.trim();
  selectedIdx = -1;
  applyFilters();
});

document.getElementById('filter-region').addEventListener('change', e => {
  filterRegion = e.target.value;
  filterNode = '';
  selectedIdx = -1;
  populateNodeDropdown();
  applyFilters();
});

document.getElementById('filter-node').addEventListener('change', e => {
  filterNode = e.target.value;
  selectedIdx = -1;
  applyFilters();
});

document.getElementById('type-btns').addEventListener('click', e => {
  const btn = e.target.closest('.type-btn');
  if (!btn) return;
  filterType = btn.dataset.type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b === btn));
  selectedIdx = -1;
  applyFilters();
});

// Column sort
document.querySelector('thead').addEventListener('click', e => {
  const th = e.target.closest('th[data-col]');
  if (!th) return;
  const col = th.dataset.col;
  if (col === 'tags') return; // not sortable
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  selectedIdx = -1;
  sortOccs();
  renderTable();
});

// ─── Editor ───────────────────────────────────────────────────────────────────
function openEditor(eventName) {
  if (!eventsDb[eventName]) return;
  editingEvent = eventName;
  editBuffer = JSON.parse(JSON.stringify(eventsDb[eventName]));

  const sb = document.getElementById('sidebar');
  sb.classList.add('editing');

  const color = getEventColor(typesMap[eventName] || new Set());

  let html = `<div class="editor-header">
    <div class="editor-title" style="color:${color}">${esc(eventName)}</div>
    <div class="editor-actions">
      <button class="btn-save" onclick="saveEdits()">Save</button>
      <button class="btn-cancel" onclick="cancelEdits()">Cancel</button>
    </div>
  </div>`;

  html += `<div id="editor-body">${buildEditorBodyHtml()}</div>`;
  sb.innerHTML = html;
  attachEditorListeners();
}

function buildEditorBodyHtml() {
  const repeatable = editBuffer.repeatable !== false;
  let html = `<label class="edit-check-label">
    <input type="checkbox" id="edit-repeatable"${repeatable ? ' checked' : ''}> Repeatable
  </label>`;
  html += `<div style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);margin:10px 0 4px">Steps</div>`;
  html += renderEditableSteps(editBuffer.steps, 'steps', 0);
  return html;
}

function rerenderEditorBody() {
  const body = document.getElementById('editor-body');
  if (!body) return;
  body.innerHTML = buildEditorBodyHtml();
  attachEditorListeners();
}

function renderEditableSteps(steps, pathPrefix, depth) {
  const COLORS = { text:'#4ade80', combat:'#dc2626', choice:'#2563eb', 'if':'#7c3aed', random:'#ca8a04', event:'#0891b2', shop:'#d97706' };
  const STEP_TYPES = ['text','choice','combat','if','random','event','sfx','give_gold','give_item','modify_stat','show_node','exit_node','mark_used'];
  const ml = depth * 12;
  let html = '';

  if (Array.isArray(steps)) {
    for (let i = 0; i < steps.length; i++) {
      const s = steps[i];
      if (!s) continue;
      const t = s.type || '?';
      const c = COLORS[t] || '#475569';
      const sp = `${pathPrefix}.${i}`;

      html += `<div class="step-editor-block" style="border-left-color:${c};margin-left:${ml}px">`;
      html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <div class="step-type-label" style="color:${c}">${esc(t)}</div>
        <button class="btn-step-del" data-arr="${esc(pathPrefix)}" data-i="${i}" title="Delete step">✕</button>
      </div>`;

      if (t === 'text') {
        const val = s.text || '';
        const rows = Math.max(3, (val.match(/\n/g) || []).length + 2);
        html += `<textarea class="text-editor" data-path="${sp}.text" spellcheck="true" rows="${rows}">${esc(val)}</textarea>`;
        html += `<label class="edit-check-small"><input type="checkbox" data-path="${sp}.clear" data-valtype="bool"${s.clear ? ' checked' : ''}> clear screen</label>`;

      } else if (t === 'choice') {
        html += `<div class="edit-field-row"><span class="edit-field-label">Header</span><input class="edit-field" type="text" data-path="${sp}.header" value="${esc(s.header||'')}"></div>`;
        (s.choices || []).forEach((ch, ci) => {
          html += `<div class="edit-field-row"><span class="edit-field-label">Choice ${ci+1}</span><input class="edit-field" type="text" data-path="${sp}.choices.${ci}.choice" value="${esc(ch.choice||'')}"></div>`;
        });
        if (s.branches) {
          for (const [key, bsteps] of Object.entries(s.branches)) {
            html += `<div class="edit-branch-label">↳ branch: ${esc(key)}</div>`;
            html += renderEditableSteps(bsteps, `${sp}.branches.${key}`, depth + 1);
          }
        }

      } else if (t === 'combat') {
        html += `<div class="edit-field-row"><span class="edit-field-label">Enemy</span><input class="edit-field" type="text" data-path="${sp}.enemy" value="${esc(s.enemy||'')}"></div>`;
        html += `<div class="edit-branch-label">↳ on_victory</div>`;
        html += renderEditableSteps(s.on_victory || [], `${sp}.on_victory`, depth + 1);

      } else if (t === 'if') {
        html += `<div class="edit-cond">${esc(JSON.stringify(s.condition || {}))}</div>`;
        html += `<div class="edit-branch-label">↳ then</div>`;
        html += renderEditableSteps(s.then || [], `${sp}.then`, depth + 1);
        html += `<div class="edit-branch-label">↳ else</div>`;
        html += renderEditableSteps(s.else || [], `${sp}.else`, depth + 1);

      } else if (t === 'random') {
        (s.outcomes || []).forEach((o, oi) => {
          html += `<div class="edit-field-row"><span class="edit-field-label">Outcome ${oi+1}</span><input class="edit-field edit-field-sm" type="number" min="0" data-path="${sp}.outcomes.${oi}.weight" data-valtype="number" value="${o.weight ?? 0}"> <span style="font-size:10px;color:var(--text-muted)">weight</span></div>`;
          html += renderEditableSteps(o.steps || [], `${sp}.outcomes.${oi}.steps`, depth + 1);
        });

      } else if (t === 'event') {
        html += `<div class="edit-field-row"><span class="edit-field-label">Event</span><input class="edit-field" type="text" data-path="${sp}.event" value="${esc(s.event||'')}"></div>`;

      } else if (t === 'sfx') {
        html += `<div class="edit-field-row"><span class="edit-field-label">Sound</span><input class="edit-field" type="text" data-path="${sp}.sound" value="${esc(s.sound||'')}"></div>`;

      } else if (t === 'give_gold') {
        html += `<div class="edit-field-row"><span class="edit-field-label">Amount</span><input class="edit-field edit-field-sm" type="number" data-path="${sp}.amount" data-valtype="number" value="${s.amount ?? 0}"></div>`;

      } else if (t === 'give_item') {
        html += `<div class="edit-field-row"><span class="edit-field-label">Item</span><input class="edit-field" type="text" data-path="${sp}.item" value="${esc(s.item||'')}"></div>`;

      } else if (t === 'modify_stat') {
        html += `<div class="edit-field-row"><span class="edit-field-label">Stat</span><input class="edit-field" type="text" data-path="${sp}.stat" value="${esc(s.stat||'')}"></div>`;
        html += `<div class="edit-field-row"><span class="edit-field-label">Amount</span><input class="edit-field edit-field-sm" type="number" data-path="${sp}.amount" data-valtype="number" value="${s.amount ?? 0}"></div>`;

      } else if (t === 'exit_node') {
        html += `<div class="edit-field-row"><span class="edit-field-label">Leads to</span><input class="edit-field" type="text" data-path="${sp}.leads_to" value="${esc(s.leads_to||'')}"></div>`;

      } else {
        const d = stepDetail(s);
        if (d) html += `<span class="edit-readonly-detail">${esc(d)}</span>`;
      }

      html += `</div>`;
    }
  }

  // Add step row — always shown at the bottom of every step list
  const typeOpts = STEP_TYPES.map(t => `<option value="${t}">${t}</option>`).join('');
  html += `<div class="add-step-row" style="margin-left:${ml}px" data-arr="${esc(pathPrefix)}">
    <select class="add-step-sel">${typeOpts}</select>
    <button class="btn-step-add">+ Add</button>
  </div>`;

  return html;
}

function attachEditorListeners() {
  const sb = document.getElementById('sidebar');

  const repCheck = document.getElementById('edit-repeatable');
  if (repCheck) repCheck.addEventListener('change', () => { editBuffer.repeatable = repCheck.checked; });

  sb.querySelectorAll('[data-path]').forEach(el => {
    const path = el.dataset.path;
    const valtype = el.dataset.valtype;
    const update = () => {
      let v = el.type === 'checkbox' ? el.checked : el.value;
      if (valtype === 'number') v = Number(v);
      setByPath(editBuffer, path, v);
    };
    el.addEventListener('input', update);
    el.addEventListener('change', update);

    if (el.tagName === 'TEXTAREA') {
      const resize = () => { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; };
      el.addEventListener('input', resize);
      requestAnimationFrame(resize);
    }
  });

  sb.querySelectorAll('.btn-step-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const arr = getByPath(editBuffer, btn.dataset.arr);
      if (Array.isArray(arr)) {
        arr.splice(parseInt(btn.dataset.i), 1);
        rerenderEditorBody();
      }
    });
  });

  sb.querySelectorAll('.add-step-row').forEach(row => {
    row.querySelector('.btn-step-add').addEventListener('click', () => {
      let arr = getByPath(editBuffer, row.dataset.arr);
      if (!Array.isArray(arr)) {
        setByPath(editBuffer, row.dataset.arr, []);
        arr = getByPath(editBuffer, row.dataset.arr);
      }
      const type = row.querySelector('.add-step-sel').value;
      if (Array.isArray(arr)) {
        arr.push(JSON.parse(JSON.stringify(STEP_DEFAULTS[type] || { type })));
        rerenderEditorBody();
      }
    });
  });
}

function saveEdits() {
  if (!editingEvent || !editBuffer) return;
  const name = editingEvent;

  eventsDb[name] = editBuffer;
  typesMap[name]   = classifySteps(editBuffer.steps);
  stepCounts[name] = countSteps(editBuffer.steps);
  chainMap[name]   = collectChains(editBuffer.steps);
  editBuffer = null; editingEvent = null;

  dirtyEvents.add(name);
  updateDownloadBtn();

  buildOccurrences();
  selectedIdx = -1;
  applyFilters();

  document.getElementById('sidebar').classList.remove('editing');

  const occ = filteredOccs.find(o => o.eventName === name) || allOccs.find(o => o.eventName === name);
  if (occ) {
    const idx = filteredOccs.indexOf(occ);
    if (idx >= 0) {
      selectedIdx = idx;
      document.querySelector(`#tbody tr[data-idx="${idx}"]`)?.classList.add('selected');
    }
    showSidebar(occ);
  }
}

function cancelEdits() {
  editBuffer = null; editingEvent = null;
  document.getElementById('sidebar').classList.remove('editing');
  if (selectedIdx >= 0 && filteredOccs[selectedIdx]) {
    showSidebar(filteredOccs[selectedIdx]);
  } else {
    document.getElementById('sidebar').innerHTML = '<div id="sidebar-placeholder">Click a row to see details.</div>';
  }
}

function updateDownloadBtn() {
  const btn = document.getElementById('btn-download');
  if (!btn) return;
  btn.style.display = dirtyEvents.size > 0 ? '' : 'none';
  btn.textContent = `⬇ Download events.json (${dirtyEvents.size} changed)`;
}

function downloadEvents() {
  const json = JSON.stringify(eventsDb, null, '\t');
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'events.json'; a.click();
  URL.revokeObjectURL(url);
}

// ─── Path helpers ─────────────────────────────────────────────────────────────
function getByPath(obj, path) {
  let cur = obj;
  for (const p of path.split('.')) {
    if (cur == null) return undefined;
    const i = parseInt(p);
    cur = isNaN(i) ? cur[p] : cur[i];
  }
  return cur;
}

function setByPath(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const idx = parseInt(parts[i]);
    cur = isNaN(idx) ? cur[parts[i]] : cur[idx];
    if (cur == null) return;
  }
  const last = parts[parts.length - 1];
  const lastIdx = parseInt(last);
  if (isNaN(lastIdx)) cur[last] = value;
  else cur[lastIdx] = value;
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
